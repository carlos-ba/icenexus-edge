<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IceNexus Edge — Login</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --card:    #1c2128;
    --border:  #30363d;
    --accent:  #00b4d8;
    --green:   #06d6a0;
    --red:     #ef476f;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --radius:  12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .login-wrap {
    width: 100%; max-width: 380px;
    padding: 0 24px;
  }

  .login-brand {
    text-align: center; margin-bottom: 36px;
  }
  .login-brand-icon { font-size: 48px; display: block; margin-bottom: 12px; }
  .login-brand-name {
    font-size: 22px; font-weight: 700;
    color: var(--accent); letter-spacing: .5px;
  }
  .login-brand-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
  }

  .login-title {
    font-size: 16px; font-weight: 600; margin-bottom: 24px;
    color: var(--text);
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: .6px; margin-bottom: 7px;
  }
  .field input {
    width: 100%; padding: 10px 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input.error { border-color: var(--red); }

  .btn-login {
    width: 100%; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
    margin-top: 8px;
  }
  .btn-login:hover   { opacity: .88; }
  .btn-login:disabled { opacity: .5; cursor: not-allowed; }

  .login-error {
    margin-top: 16px; padding: 10px 14px;
    background: rgba(239,71,111,.12);
    border: 1px solid rgba(239,71,111,.35);
    border-radius: 8px; color: var(--red);
    font-size: 13px; text-align: center;
    display: none;
  }
  .login-error.show { display: block; }

  .login-footer {
    text-align: center; margin-top: 24px;
    font-size: 12px; color: var(--muted);
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <span class="login-brand-icon">❄</span>
    <div class="login-brand-name">IceNexus Edge</div>
    <div class="login-brand-sub">Monitoramento de Refrigeração</div>
  </div>

  <div class="login-card">
    <div class="login-title">Acesso ao Dashboard</div>

    <div class="field">
      <label for="username">Usuário</label>
      <input type="text" id="username" autocomplete="username" placeholder="usuário" />
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
    </div>

    <button class="btn-login" id="btn-login">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>

  <div class="login-footer">IceNexus Edge &mdash; Acesso restrito</div>
</div>

<script>
  const btnLogin  = document.getElementById('btn-login');
  const errBox    = document.getElementById('login-error');
  const inpUser   = document.getElementById('username');
  const inpPass   = document.getElementById('password');

  async function doLogin() {
    const username = inpUser.value.trim();
    const password = inpPass.value;
    if (!username || !password) {
      showError('Preencha usuário e senha.');
      return;
    }
    btnLogin.disabled = true;
    btnLogin.textContent = 'Aguarde...';
    errBox.classList.remove('show');

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (res.ok) {
        window.location.replace('/');
      } else {
        const data = await res.json().catch(() => ({}));
        showError(data.detail || 'Usuário ou senha incorretos.');
      }
    } catch {
      showError('Erro de conexão. Tente novamente.');
    } finally {
      btnLogin.disabled = false;
      btnLogin.textContent = 'Entrar';
    }
  }

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');
    inpPass.value = '';
    inpPass.focus();
  }

  btnLogin.addEventListener('click', doLogin);
  [inpUser, inpPass].forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
  );

  // Foca no campo usuário ao carregar
  inpUser.focus();
</script>
</body>
</html>
