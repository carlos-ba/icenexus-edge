<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IceNexus Edge</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --card:     #1c2128;
    --border:   #30363d;
    --accent:   #00b4d8;
    --green:    #06d6a0;
    --yellow:   #ffd166;
    --red:      #ef476f;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --radius:   12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-logo {
    background: #ffffff; border-radius: 8px;
    padding: 5px 12px; display: flex; align-items: center;
  }
  .brand-logo img { height: 26px; display: block; }
  .brand-sep  { color: var(--border); margin: 0 8px; }
  .client-name { font-size: 14px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .last-update { font-size: 12px; color: var(--muted); }
  .mode-badge {
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    background: rgba(0,180,216,.15); color: var(--accent);
    border: 1px solid rgba(0,180,216,.3);
  }

  /* ── Layout ── */
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* ── Summary bar ── */
  .summary-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }

  /* ── Fluxo de atendimento nos alarmes ── */
  .wf { margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .wf-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600;
  }
  .wf-badge.pendente  { background: rgba(255,209,102,.15); color: var(--yellow); animation: pulse 1.4s ease-in-out infinite; }
  .wf-badge.atribuido { background: rgba(0,180,216,.15);  color: var(--accent); }
  .wf-badge.ok        { background: rgba(6,214,160,.15);  color: var(--green); }
  .wf-badge.erro      { background: rgba(239,71,111,.15); color: var(--red); }
  .wf select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    font-size: 11px; padding: 3px 6px; border-radius: 6px; outline: none;
  }
  .btn-mini {
    font-size: 11px; padding: 3px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--border); background: var(--card); color: var(--text);
  }
  .btn-mini:hover { border-color: var(--accent); }
  .btn-mini.ok:hover  { border-color: var(--green);  color: var(--green); }
  .btn-mini.nok:hover { border-color: var(--red);    color: var(--red); }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .summary-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
  .summary-card .value { font-size: 28px; font-weight: 700; }
  .summary-card .value.ok   { color: var(--green); }
  .summary-card .value.warn { color: var(--yellow); }
  .summary-card .value.crit { color: var(--red); }
  .summary-card .value.info { color: var(--accent); }

  /* ── Grupo ── */
  .grupo { margin-bottom: 28px; }
  .grupo-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .grupo-icon { font-size: 18px; }
  .grupo-nome { font-size: 16px; font-weight: 600; }
  .grupo-count { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* ── Grid de cards ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  /* ── Card instrumento ── */
  .inst-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    cursor: pointer; transition: border-color .2s, transform .1s;
    position: relative; overflow: hidden;
  }
  .inst-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .inst-card.alarm   { border-color: var(--red); }
  .inst-card.warn    { border-color: var(--yellow); }
  .inst-card.offline { opacity: .55; }
  .inst-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--green); border-radius: var(--radius) var(--radius) 0 0;
  }
  .inst-card.alarm::before   { background: var(--red); }
  .inst-card.warn::before    { background: var(--yellow); }
  .inst-card.offline::before { background: var(--border); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .card-name   { font-size: 13px; font-weight: 600; line-height: 1.3; flex: 1; }
  .card-status {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    font-weight: 600; white-space: nowrap; margin-left: 8px;
  }
  .card-status.online  { background: rgba(6,214,160,.15);  color: var(--green); }
  .card-status.offline { background: rgba(239,71,111,.15); color: var(--red); }
  .card-status.alarm   { background: rgba(239,71,111,.2);  color: var(--red); }

  .card-temp { font-size: 42px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .card-temp .unit { font-size: 18px; font-weight: 400; color: var(--muted); }
  .card-temp.ok   { color: var(--green); }
  .card-temp.warn { color: var(--yellow); }
  .card-temp.crit { color: var(--red); }
  .card-temp.off  { color: var(--muted); font-size: 28px; }

  .card-setpoint { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .card-setpoint span { color: var(--accent); }

  .card-outputs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .output-pill {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    border: 1px solid var(--border); color: var(--muted); transition: all .2s;
  }
  .output-pill.on         { border-color: var(--accent); color: var(--accent); background: rgba(0,180,216,.1); }
  .output-pill.on.defrost { border-color: var(--yellow); color: var(--yellow); background: rgba(255,209,102,.1); }

  .card-alarms { margin-top: 8px; }
  .alarm-item {
    font-size: 11px; color: var(--red);
    display: flex; align-items: center; gap: 5px;
    padding: 3px 0; border-top: 1px solid rgba(239,71,111,.15);
  }
  .alarm-item::before { content: '⚠'; font-size: 10px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 680px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; padding: 28px;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title  { font-size: 18px; font-weight: 700; }
  .modal-close  { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
  .modal-close:hover { color: var(--text); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .detail-row  { background: var(--card); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 2px; }
  .detail-row .dl { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: .6px; }
  .detail-row .dv { font-size: 18px; font-weight: 600; }
  .chart-container { position: relative; height: 180px; margin-bottom: 16px; }

  /* ── Painel alarmes ── */
  .alarm-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 28px; overflow: hidden; }
  .alarm-panel-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .alarm-panel-header .badge { background: var(--red); color: #fff; font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 700; }
  .alarm-list { max-height: 320px; overflow-y: auto; }
  .alarm-row {
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 160px 1fr auto;
    gap: 12px; align-items: start; font-size: 12px;
  }
  .alarm-row .diag {
    font-size: 11px; color: var(--muted);
    margin-top: 4px; line-height: 1.5;
  }
  .alarm-row .diag b { color: var(--text); font-weight: 600; }
  .alarm-row .diag.acao { color: var(--accent); }
  .alarm-row .diag.acao b { color: var(--accent); }
  .alarm-row:last-child { border-bottom: none; }
  .alarm-row .instr { color: var(--accent); font-weight: 600; }
  .alarm-row .desc  { color: var(--text); }
  .alarm-row .time  { color: var(--muted); white-space: nowrap; }
  .alarm-row.active { background: rgba(239,71,111,.05); }
  .no-alarms { padding: 20px 18px; color: var(--muted); font-size: 13px; text-align: center; }

  /* ── Loader ── */
  .loader {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 999; transition: opacity .4s;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-icon { font-size: 52px; animation: pulse 1.4s ease-in-out infinite; }
  .loader-text { font-size: 14px; color: var(--muted); }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.12);opacity:.7} }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Card sem sinal ── */
  .inst-card.no-signal { opacity: .5; filter: grayscale(.6); }
  .inst-card.no-signal::before { background: var(--muted); }
  .card-status.no-signal { background: rgba(139,148,158,.15); color: var(--muted); }

  /* ── Painel Admin ── */
  #admin-panel {
    display: none;
    background: var(--surface); border: 1px solid rgba(255,209,102,.3);
    border-radius: var(--radius); padding: 18px 22px;
    margin-bottom: 24px;
  }
  #admin-panel.visible { display: block; }
  .admin-panel-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .9px; color: var(--yellow); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .admin-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .admin-btn {
    font-size: 13px; padding: 8px 18px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    transition: border-color .2s, background .2s;
  }
  .admin-btn:hover { border-color: var(--accent); background: rgba(0,180,216,.08); }
  .admin-btn.danger:hover { border-color: var(--red); background: rgba(239,71,111,.08); color: var(--red); }
  .admin-btn:disabled { opacity: .5; cursor: not-allowed; }
  .admin-msg { font-size: 12px; color: var(--muted); margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-icon" style="background:#fff;border-radius:12px;padding:14px 24px"><img src="/static/img/logo.png" alt="IceNexus IAR" style="height:40px;display:block"></div>
  <div class="loader-text">Carregando IceNexus IAR...</div>
</div>

<header>
  <div class="brand">
    <span class="brand-logo"><img src="/static/img/logo.png" alt="IceNexus IAR"></span>
    <span class="brand-sep">|</span>
    <span class="client-name" id="clientName">—</span>
  </div>
  <div class="header-right">
    <span class="mode-badge" id="modeBadge">automático</span>
    <span class="last-update" id="lastUpdate">—</span>
    <div class="status-dot" id="statusDot"></div>
    <div id="user-info" style="display:flex;align-items:center;gap:10px;border-left:1px solid var(--border);padding-left:14px;margin-left:4px">
      <span id="user-badge" style="font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(0,180,216,.12);color:var(--accent);border:1px solid rgba(0,180,216,.25)"></span>
      <button id="btn-logout" onclick="doLogout()" style="font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer">Sair</button>
    </div>
  </div>
</header>

<main>
  <div class="summary-bar">
    <div class="summary-card">
      <span class="label">Instrumentos</span>
      <span class="value info" id="sumTotal">—</span>
    </div>
    <div class="summary-card">
      <span class="label">Online</span>
      <span class="value ok" id="sumOnline">—</span>
    </div>
    <div class="summary-card">
      <span class="label">Offline</span>
      <span class="value warn" id="sumOffline">—</span>
    </div>
    <div class="summary-card">
      <span class="label">Alarmes Ativos</span>
      <span class="value crit" id="sumAlarms">—</span>
    </div>
    <div class="summary-card">
      <span class="label">Acerto Diagnóstico IA</span>
      <span class="value info" id="sumIA">—</span>
    </div>
  </div>

  <div id="admin-panel">
    <div class="admin-panel-title">⚙ Ferramentas de Demonstração</div>
    <div class="admin-btns">
      <button class="admin-btn" id="btn-collect" onclick="adminCollect()">⚡ Coletar Agora</button>
      <button class="admin-btn danger" id="btn-clear" onclick="adminClear()">🗑 Limpar Histórico</button>
      <button class="admin-btn" id="btn-analise" onclick="adminAnalise()" style="border-color:rgba(0,180,216,.5);color:var(--accent)">🧠 Análise Geral do Sistema</button>
    </div>
    <div class="admin-panel-title" style="margin-top:20px">🔥 Simulador de Falhas <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">— atua somente no controlador emulado</span></div>
    <div class="admin-btns">
      <button class="admin-btn" onclick="adminFault('vazamento_gas')">💨 Vazamento de gás</button>
      <button class="admin-btn" onclick="adminFault('retorno_liquido')">💧 Retorno de líquido</button>
      <button class="admin-btn" onclick="adminFault('condensador_sujo')">🌡 Condensador sujo</button>
      <button class="admin-btn" onclick="adminFault('compressor_ineficiente')">⚙ Compressor sem rendimento</button>
      <button class="admin-btn" onclick="adminFault('sensor_defeituoso')">📡 Sensor defeituoso</button>
      <button class="admin-btn" onclick="adminFault('porta_aberta')">🚪 Porta aberta</button>
      <button class="admin-btn" id="btn-normalizar" onclick="adminFaultClear()" style="border-color:rgba(6,214,160,.5);color:var(--green)">✅ Normalizar sistema</button>
    </div>
    <div class="admin-msg" id="admin-msg"></div>
  </div>

  <div id="grupos"></div>

  <div class="alarm-panel">
    <div class="alarm-panel-header">
      ⚠ Ocorrências Recentes
      <span class="badge" id="alarmBadge">0</span>
    </div>
    <div class="alarm-list" id="alarmList">
      <div class="no-alarms">Nenhum alarme ativo</div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="analiseOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🧠 Análise Geral do Sistema</span>
      <button class="modal-close" onclick="closeAnalise()">✕</button>
    </div>
    <div id="analiseBody" style="font-size:13px;line-height:1.7"></div>
    <div id="analiseRodape" style="margin-top:16px;font-size:11px;color:var(--muted)"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">—</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="detail-grid" id="detailGrid"></div>
    <div class="chart-container">
      <canvas id="histChart"></canvas>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
let histChart = null;
let currentUser = null;
let tecnicos = [];

async function doLogout() {
  await fetch('/logout', { method: 'POST' });
  window.location.replace('/login');
}

async function initAuth() {
  const res = await fetch('/api/v1/me');
  if (res.status === 401) { window.location.replace('/login'); return false; }
  const user = await res.json();
  const badge = document.getElementById('user-badge');
  if (badge) {
    const roleLabel = user.role === 'admin' ? 'Admin' : 'Visualização';
    badge.textContent = `${user.username}  ·  ${roleLabel}`;
    if (user.role !== 'admin') {
      badge.style.background = 'rgba(139,148,158,.12)';
      badge.style.color      = 'var(--muted)';
      badge.style.border     = '1px solid rgba(139,148,158,.2)';
    }
  }
  currentUser = user;
  if (user.role === 'admin') {
    document.getElementById('admin-panel').classList.add('visible');
  }
  try {
    tecnicos = await (await fetch(`${API}/tecnicos`)).json();
  } catch(e) { tecnicos = []; }
  return true;
}

async function adminCollect() {
  const btn = document.getElementById('btn-collect');
  const msg = document.getElementById('admin-msg');
  btn.disabled = true;
  msg.textContent = 'Disparando coleta...';
  try {
    const res = await fetch(`${API}/admin/collect-now`, { method: 'POST' });
    if (res.ok) {
      msg.textContent = '✅ Coleta disparada. Aguarde 5s e o dashboard atualizará.';
      setTimeout(refresh, 5000);
    } else {
      msg.textContent = `Erro ${res.status}`;
    }
  } catch(e) {
    msg.textContent = 'Falha na requisição.';
  }
  btn.disabled = false;
}

async function adminFault(cenario) {
  const msg = document.getElementById('admin-msg');
  msg.textContent = 'Aplicando cenário de falha...';
  try {
    const res = await fetch(`${API}/admin/fault/${cenario}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = `⚠ Falha simulada: ${data.cenario} — ${data.descricao}. O alarme abre em ~10s.`;
      setTimeout(refresh, 10000);
    } else {
      msg.textContent = `Erro ${res.status}: ${data.detail || ''}`;
    }
  } catch(e) {
    msg.textContent = 'Falha na requisição — o emulador está rodando?';
  }
}

async function adminFaultClear() {
  const msg = document.getElementById('admin-msg');
  msg.textContent = 'Normalizando sistema...';
  try {
    const res = await fetch(`${API}/admin/fault/clear`, { method: 'POST' });
    if (res.ok) {
      msg.textContent = '✅ Sistema normalizado — sensores voltam à física normal e os alarmes fecham em ~15s.';
      setTimeout(refresh, 10000);
    } else {
      msg.textContent = `Erro ${res.status}`;
    }
  } catch(e) {
    msg.textContent = 'Falha na requisição — o emulador está rodando?';
  }
}

function mdParaHtml(md) {
  // Conversor markdown mínimo (títulos, negrito, itálico, listas)
  const esc = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const linhas = esc.split('\n');
  let html = '', emLista = false;
  for (const l of linhas) {
    let t = l.trim();
    if (t.startsWith('## ')) {
      if (emLista) { html += '</ul>'; emLista = false; }
      html += `<h3 style="margin:16px 0 8px;font-size:15px;color:var(--accent)">${t.slice(3)}</h3>`;
      continue;
    }
    const itemLista = /^(-|\*|\d+\.)\s+/.exec(t);
    if (itemLista) {
      if (!emLista) { html += '<ul style="margin:4px 0 4px 18px">'; emLista = true; }
      html += `<li style="margin:3px 0">${t.slice(itemLista[0].length)}</li>`;
      continue;
    }
    if (emLista) { html += '</ul>'; emLista = false; }
    if (t) html += `<p style="margin:6px 0">${t}</p>`;
  }
  if (emLista) html += '</ul>';
  return html
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.+?)\*/g, '<i style="color:var(--muted)">$1</i>');
}

async function adminAnalise() {
  const btn  = document.getElementById('btn-analise');
  const body = document.getElementById('analiseBody');
  const rodape = document.getElementById('analiseRodape');
  btn.disabled = true;
  btn.textContent = '🧠 Analisando...';
  body.innerHTML = '<p style="color:var(--muted)">Coletando dados de todos os instrumentos e consultando o engenheiro de IA... isso leva alguns segundos.</p>';
  rodape.textContent = '';
  document.getElementById('analiseOverlay').classList.add('open');
  try {
    const res = await fetch(`${API}/admin/analise-geral`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      body.innerHTML = mdParaHtml(data.analise);
      const quando = new Date(data.gerado_em).toLocaleString('pt-BR');
      const fonte = data.fonte === 'ia' ? 'Análise por IA (Claude)' : 'Análise local por regras';
      rodape.textContent = `${fonte} · ${data.instrumentos_analisados} instrumento(s) · ${quando}`;
    } else {
      body.innerHTML = `<p style="color:var(--red)">Erro ${res.status}: ${data.detail || 'falha na análise'}</p>`;
    }
  } catch(e) {
    body.innerHTML = '<p style="color:var(--red)">Falha na requisição — servidor indisponível.</p>';
  }
  btn.disabled = false;
  btn.textContent = '🧠 Análise Geral do Sistema';
}

function closeAnalise() {
  document.getElementById('analiseOverlay').classList.remove('open');
}
document.getElementById('analiseOverlay').addEventListener('click', e => {
  if (e.target.id === 'analiseOverlay') closeAnalise();
});

async function adminClear() {
  if (!confirm('Apagar todo o histórico de leituras e alarmes? Os instrumentos serão mantidos.')) return;
  const btn = document.getElementById('btn-clear');
  const msg = document.getElementById('admin-msg');
  btn.disabled = true;
  msg.textContent = 'Limpando histórico...';
  try {
    const res = await fetch(`${API}/admin/clear-history`, { method: 'POST' });
    if (res.ok) {
      msg.textContent = '✅ Histórico limpo. Os instrumentos continuam cadastrados.';
      await refresh();
    } else {
      msg.textContent = `Erro ${res.status}`;
    }
  } catch(e) {
    msg.textContent = 'Falha na requisição.';
  }
  btn.disabled = false;
}

async function init() {
  const ok = await initAuth();
  if (!ok) return;
  await refresh();
  document.getElementById('loader').classList.add('hidden');
  setInterval(refresh, 5000);
}

async function refresh() {
  try {
    const res = await fetch(`${API}/dashboard`);
    if (res.status === 401) { window.location.replace('/login'); return; }
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    render(data);
    document.getElementById('statusDot').classList.remove('offline');
    document.getElementById('lastUpdate').textContent =
      'Atualizado ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    document.getElementById('statusDot').classList.add('offline');
    document.getElementById('lastUpdate').textContent = 'Sem conexão';
  }
}

function render(data) {
  let titulo = data.cliente || 'IceNexus Edge';
  if (data.unidade) titulo += ' — ' + data.unidade;
  document.getElementById('clientName').textContent = titulo;
  document.title = titulo + ' | IceNexus';
  document.getElementById('modeBadge').textContent =
    data.modo === 'personalizado' ? '✦ personalizado' : '⚡ automático';

  let total = 0, online = 0, offline = 0, alarms = 0;
  for (const g of data.grupos || []) {
    for (const inst of g.instrumentos || []) {
      const live = inst._live || {};
      total++;
      if (live.online) online++; else offline++;
      alarms += live.alarm_count || 0;
    }
  }
  document.getElementById('sumTotal').textContent   = total;
  document.getElementById('sumOnline').textContent  = online;
  document.getElementById('sumOffline').textContent = offline;
  document.getElementById('sumAlarms').textContent  = alarms;
  document.getElementById('alarmBadge').textContent = alarms;

  const gruposEl = document.getElementById('grupos');
  gruposEl.innerHTML = '';
  for (const grupo of data.grupos || []) gruposEl.appendChild(renderGrupo(grupo));

  loadAlarms();
}

async function loadAlarms() {
  try {
    const res = await fetch(`${API}/alarms/recent`);
    if (!res.ok) return;
    renderAlarmPanel(await res.json());
  } catch(e) {}
}

function renderGrupo(grupo) {
  const insts = grupo.instrumentos || [];
  const el = document.createElement('div');
  el.className = 'grupo';
  el.innerHTML = `
    <div class="grupo-header">
      <span class="grupo-icon">${grupo.icone || '📡'}</span>
      <span class="grupo-nome">${grupo.nome}</span>
      <span class="grupo-count">${insts.length} instrumento${insts.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="cards-grid"></div>
  `;
  const grid = el.querySelector('.cards-grid');
  for (const inst of insts) grid.appendChild(renderCard(inst, grupo));
  return el;
}

function renderCard(inst, grupo) {
  const live    = inst._live || {};
  const sensors = live.sensors || {};
  const outputs = live.outputs || {};
  const alarms  = live.active_alarms || [];
  const sensor  = inst.sensor_principal || 't1';
  const tempVal = sensors[sensor];
  const setpt   = sensors.setpoint ?? inst.setpoint_ref;
  const isOnline = live.online !== false && live.has_data;
  const hasAlarm = alarms.length > 0;

  const noSignal = !live.has_data;
  let cardClass = 'inst-card';
  if (noSignal) cardClass += ' no-signal';
  else if (!isOnline) cardClass += ' offline';
  else if (hasAlarm) cardClass += ' alarm';
  else if (tempVal != null && inst.alarme_max != null && tempVal > inst.alarme_max) cardClass += ' warn';

  let tempClass = 'off';
  if (isOnline && tempVal != null) {
    if (hasAlarm) tempClass = 'crit';
    else if ((inst.alarme_max != null && tempVal > inst.alarme_max) ||
             (inst.alarme_min != null && tempVal < inst.alarme_min)) tempClass = 'warn';
    else tempClass = 'ok';
  }

  const tempStr  = tempVal != null ? tempVal.toFixed(1) : '—';
  const setptStr = setpt   != null ? setpt.toFixed(1) + '°C' : '—';
  const statusLabel = noSignal ? 'sem sinal' : !isOnline ? 'offline' : hasAlarm ? 'alarme' : 'online';
  const statusClass = noSignal ? 'no-signal' : !isOnline ? 'offline' : hasAlarm ? 'alarm'  : 'online';

  const pillsHtml = [
    { key: 'refrigeration', label: '🔵 Refrig.',  cls: '' },
    { key: 'fan',           label: '🌀 Vent.',     cls: '' },
    { key: 'defrost',       label: '🔥 Degelo',    cls: 'defrost' },
  ].filter(p => outputs[p.key] != null).map(p =>
    `<span class="output-pill ${outputs[p.key] ? 'on ' + p.cls : ''}">${p.label}</span>`
  ).join('');

  const alarmsHtml = alarms.slice(0,3).map(a =>
    `<div class="alarm-item">${a.description}</div>`
  ).join('');

  const el = document.createElement('div');
  el.className = cardClass;
  el.innerHTML = `
    <div class="card-header">
      <span class="card-name">${inst.nome_exibicao || live.name || '—'}</span>
      <span class="card-status ${statusClass}">${statusLabel}</span>
    </div>
    <div class="card-temp ${tempClass}">
      ${tempStr}<span class="unit">${tempVal != null ? '°C' : ''}</span>
    </div>
    <div class="card-setpoint">SP: <span>${setptStr}</span></div>
    <div class="card-outputs">${pillsHtml}</div>
    ${alarmsHtml ? `<div class="card-alarms">${alarmsHtml}</div>` : ''}
  `;
  el.addEventListener('click', () => openModal(inst, grupo));
  return el;
}

function renderWorkflow(a) {
  const isAdmin = currentUser && currentUser.role === 'admin';

  // 1) Sem responsável → pendência gritante + atribuição (admin)
  if (!a.assumed_by) {
    const select = isAdmin && tecnicos.length
      ? `<select id="sel-tec-${a.id}">${tecnicos.map(t => `<option>${t}</option>`).join('')}</select>
         <button class="btn-mini" onclick="assignAlarm(${a.id})">Atribuir</button>`
      : '';
    return `<div class="wf"><span class="wf-badge pendente">⏳ Aguardando responsável</span>${select}</div>`;
  }

  // 2) Com responsável, diagnóstico ainda não validado
  if (a.diagnostico_correto == null) {
    const botoes = isAdmin
      ? `<button class="btn-mini ok"  onclick="validateAlarm(${a.id}, true)">✔ Diagnóstico correto</button>
         <button class="btn-mini nok" onclick="validateAlarm(${a.id}, false)">✘ Incorreto</button>`
      : '';
    return `<div class="wf"><span class="wf-badge atribuido">👤 ${a.assumed_by}</span>${botoes}</div>`;
  }

  // 3) Validado
  const resultado = a.diagnostico_correto
    ? `<span class="wf-badge ok">✅ Diagnóstico confirmado por ${a.assumed_by}</span>`
    : `<span class="wf-badge erro">⚠ Causa real: ${a.causa_real}</span><span class="wf-badge atribuido">👤 ${a.assumed_by}</span>`;
  return `<div class="wf">${resultado}</div>`;
}

async function assignAlarm(id) {
  const sel = document.getElementById('sel-tec-' + id);
  if (!sel || !sel.value) return;
  if (document.activeElement) document.activeElement.blur();
  const res = await fetch(`${API}/alarms/${id}/assume`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ technician: sel.value }),
  });
  if (!res.ok) {
    const d = await res.json().catch(() => ({}));
    alert(d.detail || 'Erro ao atribuir responsável');
  }
  loadAlarms();
}

async function validateAlarm(id, correto) {
  if (document.activeElement) document.activeElement.blur();
  let causa = null;
  if (!correto) {
    causa = prompt('Qual foi a causa real do problema?');
    if (!causa) return;
  }
  const res = await fetch(`${API}/alarms/${id}/validate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ correto, causa_real: causa }),
  });
  if (!res.ok) {
    const d = await res.json().catch(() => ({}));
    alert(d.detail || 'Erro ao validar');
  }
  loadAlarms();
}

function renderAlarmPanel(data) {
  const list  = document.getElementById('alarmList');
  // Não re-renderiza apenas enquanto o usuário está com um SELECT aberto
  // (botões devem permitir a atualização — senão o painel congela após o clique)
  const ae = document.activeElement;
  if (ae && list.contains(ae) && ae.tagName === 'SELECT') return;
  const stats = data.ia_stats || {};
  document.getElementById('sumIA').textContent =
    stats.pct != null ? stats.pct + '%' : '—';

  const all = data.alarms || [];
  list.innerHTML = all.length
    ? all.map(a => {
        const hora = a.started_at
          ? new Date(a.started_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
          : '';
        const estado = a.is_active ? '' : ' <span style="color:var(--green)">(resolvido)</span>';
        return `
        <div class="alarm-row ${a.is_active ? 'active' : ''}">
          <span class="instr">${a.instrument}</span>
          <div class="desc">
            ${a.problema || a.description}${estado}
            ${a.causas ? `<div class="diag"><b>Causas prováveis:</b> ${a.causas.join(' · ')}</div>` : ''}
            ${a.acoes  ? `<div class="diag acao"><b>Ações recomendadas:</b> ${a.acoes.join(' · ')}</div>` : ''}
            ${renderWorkflow(a)}
          </div>
          <span class="time">${hora}<br>${a.code}</span>
        </div>`;
      }).join('')
    : '<div class="no-alarms">✅ Nenhum alarme ativo</div>';
}

async function openModal(inst, grupo) {
  const live    = inst._live || {};
  const sensors = live.sensors || {};
  const outputs = live.outputs || {};

  document.getElementById('modalTitle').textContent =
    (inst.nome_exibicao || live.name || '—') + ' — ' + grupo.nome;

  const hasPressure = sensors.p1 != null || sensors.p2 != null;
  const rows = [
    { l: 'T1 — Sonda 1',      v: fmt(sensors.t1,        '°C') },
    { l: 'T2 — Sonda 2',      v: fmt(sensors.t2,        '°C') },
    { l: 'T3 — Câmara',       v: fmt(sensors.t3,        '°C') },
    { l: 'T4 — Evaporador',   v: fmt(sensors.t4,        '°C'), hide: sensors.t4 == null },
    { l: 'Setpoint',           v: fmt(sensors.setpoint,  '°C') },
    { l: 'P1 — Sucção',       v: fmt(sensors.p1,        ' PSI'), hide: !hasPressure },
    { l: 'P2 — Descarga',     v: fmt(sensors.p2,        ' PSI'), hide: !hasPressure },
    { l: 'T. Sat. P1',        v: fmt(sensors.t_sat_p1,  '°C'),  hide: !hasPressure },
    { l: 'T. Sat. P2',        v: fmt(sensors.t_sat_p2,  '°C'),  hide: !hasPressure },
    { l: 'Superaquecimento',   v: fmt(sensors.superheat,  '°C'), hide: !hasPressure },
    { l: 'Subresfriamento',    v: fmt(sensors.subcooling, '°C'), hide: !hasPressure },
    { l: 'Compressor',         v: out(outputs.refrigeration) },
    { l: 'Ventilador',         v: out(outputs.fan) },
    { l: 'Degelo',             v: out(outputs.defrost) },
    { l: 'Modelo',             v: live.model_name || '—' },
    { l: 'Endereço RS-485',   v: live.address ?? '—' },
    { l: 'Status',             v: live.online ? '🟢 Online' : '🔴 Offline' },
  ].filter(r => !r.hide);
  document.getElementById('detailGrid').innerHTML = rows.map(r =>
    `<div class="detail-row"><span class="dl">${r.l}</span><span class="dv">${r.v}</span></div>`
  ).join('');

  document.getElementById('modalOverlay').classList.add('open');
  if (live.id) loadHistory(live.id);
}

async function loadHistory(instrId) {
  try {
    const res  = await fetch(`${API}/instruments/${instrId}/history?limit=120`);
    const data = await res.json();
    const labels = data.map(r => new Date(r.timestamp).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }));
    if (histChart) { histChart.destroy(); histChart = null; }
    histChart = new Chart(document.getElementById('histChart').getContext('2d'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'T1 (°C)', data: data.map(r => r.t1), borderColor: '#00b4d8', backgroundColor: 'rgba(0,180,216,.08)', borderWidth: 2, pointRadius: 0, tension: .3, fill: true },
          { label: 'Setpoint', data: data.map(r => r.setpoint), borderColor: '#ffd166', borderWidth: 1.5, borderDash: [5,3], pointRadius: 0 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: '#8b949e', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#30363d' } },
          y: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#30363d' } },
        }
      }
    });
  } catch(e) { console.error('Histórico:', e); }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  if (histChart) { histChart.destroy(); histChart = null; }
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') closeModal();
});

function fmt(v, u) { return v != null ? v.toFixed(1) + u : '—'; }
function out(v)    { return v == null ? '—' : v ? '✅ Ligado' : '⭕ Desligado'; }

init();
</script>
